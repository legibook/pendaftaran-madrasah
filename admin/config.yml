backend:
  name: github
  repo: legibook/pendaftaran-madrasah
  branch: main

media_folder: "media"
public_folder: "/media"

collections:
  # ----------------------------------------
  # MENU 1: JADWAL KURSUS
  # ----------------------------------------
  - name: "jadwal"
    label: "📅 Jadwal & Kuota"
    files:
      - file: "data/jadwal.json"
        label: "Pengaturan Jadwal"
        name: "jadwal_data"
        fields:
          - {label: "Kapasitas Default (Jika tidak diatur di kelas)", name: "default_quota", widget: "number", default: 15}
          - label: "Daftar Kelas"
            name: "kelas"
            widget: "list"
            fields:
              - {label: "Nama Kelas", name: "nama", widget: "string"}
              - {label: "Kuota Khusus", name: "kuota", widget: "number", required: false}
              - label: "Opsi Jadwal"
                name: "schedules"
                widget: "list"
                fields:
                  - {label: "Gender", name: "gender", widget: "select", options: ["Laki-laki", "Perempuan"]}
                  - {label: "Tipe", name: "type", widget: "select", options: ["Online", "Offline"]}
                  - {label: "Waktu (Pisahkan dengan koma jika banyak)", name: "times", widget: "string"}

  # ----------------------------------------
  # MENU 2: DATA PENDAFTAR (Fokus Profil)
  # ----------------------------------------
  - name: "pendaftar"
    label: "👥 Data Pendaftar"
    folder: "data/pendaftar"
    create: false 
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    editor:
      preview: false
    summary: '{{timestamp}} | {{fullname}} - {{category}} ({{gender}})'
    fields:
      - {label: "Waktu Daftar", name: "timestamp", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss"}
      - {label: "Nama Lengkap", name: "fullname", widget: "string"}
      - {label: "Nama Panggilan", name: "nickname", widget: "string"}
      - {label: "Jenis Kelamin", name: "gender", widget: "string"}
      - {label: "WhatsApp", name: "wa", widget: "string"}
      - {label: "Alamat", name: "address", widget: "text"}
      - {label: "Kelas Terpilih", name: "category", widget: "string"}
      - {label: "Jadwal Terpilih", name: "schedule", widget: "string"}
      - {label: "Kemampuan Baca", name: "ability", widget: "string"}
      - {label: "Bukti Pembayaran Awal", name: "payment_proof", widget: "image"}
      # Field tersembunyi agar tidak hilang saat di-save dari menu ini
      - {label: "Status SPP Bulanan", name: "status_spp", widget: "hidden", required: false, default: "Belum Bayar"}

  # ----------------------------------------
  # MENU 3: STATUS PEMBAYARAN (Baru)
  # ----------------------------------------
  - name: "pembayaran"
    label: "💳 Status Pembayaran"
    folder: "data/pendaftar"
    create: false 
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    editor:
      preview: false
    # Tampilan tabel disesuaikan untuk fokus ke Status Bayar
    summary: 'STATUS: {{status_spp}}  ||  {{fullname}} - ({{schedule}})'
    fields:
      # Field Status ditaruh paling atas agar admin langsung melihatnya saat klik peserta
      - {label: "Status SPP (Ketik Bulan Lunas Terakhir)", name: "status_spp", widget: "string", default: "Belum Bayar", hint: "Contoh ketik: Lunas Mei 2026. Ini akan memudahkan Anda melacak tanpa perlu mereset status setiap bulan."}
      
      # Data lainnya ditampilkan sebagai Read-Only agar fokus ke pembayaran saja
      - {label: "Nama Lengkap", name: "fullname", widget: "string"}
      - {label: "Jadwal Terpilih", name: "schedule", widget: "string"}
      - {label: "Kelas", name: "category", widget: "string"}
      - {label: "WhatsApp", name: "wa", widget: "string"}
      
      # Sisa data disembunyikan di menu ini agar tidak penuh (tapi tidak dihapus dari file)
      - {label: "Waktu Daftar", name: "timestamp", widget: "hidden"}
      - {label: "Nama Panggilan", name: "nickname", widget: "hidden"}
      - {label: "Jenis Kelamin", name: "gender", widget: "hidden"}
      - {label: "Alamat", name: "address", widget: "hidden"}
      - {label: "Kemampuan Baca", name: "ability", widget: "hidden"}
      - {label: "Bukti Pembayaran Awal", name: "payment_proof", widget: "hidden"}
